name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: spec/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: spec

      - name: Build Next.js app
        run: npm run build
        working-directory: spec

      - name: Copy static site files
        run: |
          mkdir -p _site
          cp -r spec/out _site/spec
          # Copy existing static site files (everything except spec/ and .github/)
          find . -maxdepth 1 -not -name '.' -not -name '.git' -not -name '.github' -not -name 'spec' -not -name '_site' -exec cp -r {} _site/ \;

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

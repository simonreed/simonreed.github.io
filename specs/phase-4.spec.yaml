summary: |
  Phase 4 turns projects from empty client-detail records into the consultant's
  working surface for choosing buildings and curating spaces. It runs across two
  parallel workstreams.

  Phase 3 established that a project aggregates one or more searches. Each
  search captures a snapshot of the buildings that matched, and each building
  holds the spaces that were selected. Phase 4 makes that pipeline usable by
  staff — they can run a search inside a project context, choose which
  buildings the client should see, and curate the spaces on each building. The
  curated set is what becomes the client report in Phase 5.

  4a. Building selection (list + map) — from a project, staff can launch a
  search by location with filters for provider, amenity, and desk range. The
  results render in two synchronised views: a list of buildings with provider
  logos and key facts, and an interactive map with selectable pins. Selecting
  a building attaches it to the project's search; deselecting removes it.
  Staff can reorder the selected buildings to control the order they appear
  in the report.

  4b. Space curation per building — for each selected building, staff can
  see all the published spaces the provider currently has and tick the ones
  that should appear on the report. They can also manually add ad-hoc spaces
  for availability the consultant knows about but that isn't in the system
  yet. Both database-linked and ad-hoc spaces are snapshotted to the report
  so later changes by the provider don't alter what was sent to the client.

  This phase does not include sending the report to the client or to providers
  — those flows are Phase 5.

assumptions:
  # 4a — Building selection
  - id: A1
    text: "From the project detail page, staff can click \"Add a search\" to open the staff search builder scoped to that project. Any buildings or spaces they pick are linked to that project via the search."

  - id: A2
    text: "The staff search builder is a single screen with a location search at the top, a list view of matching buildings on the left, and a map view on the right. The two views are synchronised — selecting a building on the map highlights it in the list, and vice versa."

  - id: A3
    text: "The search results show all published buildings, including those with no currently available spaces — staff often pick those deliberately to add ad-hoc spaces themselves. Unpublished buildings are always hidden so staff don't accidentally include them. (Revised at sign-off 2026-05-15 per Liz's flag: the earlier wording excluded buildings with no available spaces; that requirement is dropped.)"

  - id: A4
    text: "Filters available on the search builder: location with radius (in miles), provider, amenities (multi-select with AND logic), and desk range (min and max). Filters update both the list and the map in real time."

  - id: A5
    text: "Each building card in the list shows: provider logo, building name, address, distance from the search location, the number of currently available spaces, and a select/deselect toggle."

  - id: A6
    text: "The map uses provider logos as the pin where a logo is available, with a fallback marker style. Clicking a pin opens a small popup with the building name, address, and a select/deselect button."

  - id: A7
    text: "Staff can reorder the selected buildings by drag-and-drop. The order stored is the order the buildings will appear in the client report. (See Q1 on default ordering.)"

  - id: A8
    text: "Staff can remove a selected building at any time. Removing a building also removes any space picks and ad-hoc spaces that were attached to it on this report — staff are warned before this happens."

  # 4b — Space curation
  - id: A9
    text: "When a building is selected, staff see all of that provider's currently published spaces in that building. Each space row shows: name, type, floor or placement, desk range, monthly cost, and availability status. Staff tick the spaces that should appear on the client report."

  - id: A10
    text: "Selected database spaces are snapshotted onto the report at the moment of selection. If the provider later edits or removes the space, the report still shows the original details. Staff see a small flag on the report if the underlying space has changed since selection."

  - id: A11
    text: "Staff can also add ad-hoc spaces that are not yet in the database — for availability the consultant has heard about directly from a provider but that hasn't been entered yet. An ad-hoc space captures: name, type, floor or placement, desk range, monthly cost, and availability status."

  - id: A12
    text: "Ad-hoc spaces are clearly distinguished from database-linked spaces in the staff UI (a small \"Manual\" tag) so staff always know what they've added themselves vs what came from the provider's data."

  - id: A13
    text: "Staff can edit any space attached to a report — both database-linked snapshots and ad-hoc entries. Editing a database-linked space does not affect the original; it only changes what the client sees on this report."

  - id: A14
    text: "Staff can remove a space from a report at any time. For ad-hoc spaces this deletes the entry. For database-linked snapshots this just unselects them — the original space in the provider's data is untouched."

  - id: A15
    text: "Pricing on ad-hoc spaces follows the same rules as Phase 3 provider pricing: cannot be negative, maximum desks (if set) must be at least the minimum, leaving pricing blank is allowed."

  - id: A16
    text: "A report can include a maximum of 12 buildings. When staff reach 12, a warning is shown and no further buildings can be added until one is removed. The cap is per report — a project can hold many reports. (Added at sign-off 2026-05-15 per Liz / Chris Mahon on flow-1; confirmed per-report by Liz 2026-05-22, deliberately limited to avoid overwhelming clients.)"

  - id: A17
    text: "Ad-hoc spaces and database-linked spaces are not mutually exclusive on a building. Staff can select database spaces AND add ad-hoc spaces on the same building — the report shows both. (Clarified at sign-off 2026-05-15 per Liz's note on flow-2.)"

  # 4c — Project ↔ search entry (email-approved 2026-05-20/21, added in v1.2)
  - id: A18
    text: "The default entry is project-first: opening a project and starting a search from there ties the search (and its report) to that project and its client automatically — there is no separate \"pick a client\" step. As a fallback, staff exploring without a client can run a standalone search and later \"Save to a project\" — a picker to either create a new project (entering client details in the same step) or add to an existing one. (Resolves Liz's duplicate-admin concern 2026-05-20; Chris confirmed the assign-later path is built.)"

  - id: A19
    text: "A project holds only client-level details (name, company, contact). The brief/criteria that define what was searched for live on each search/report, not on the project — so the multiple reports under one project can legitimately differ from one another. (Resolves Liz's confusion about the old static \"requirements\" section, 2026-05-20/21.)"

# Open questions Q1-Q4 were RESOLVED by Liz at the 2026-05-15 sign-off (recommendations
# accepted) and are baked into the assumptions/build — removed here so the delivery
# sign-off does not re-ask them:
#   Q1 default building order  -> by distance from search location, closest first (built; see A7)
#   Q2 multi-search report     -> one combined, staff-orderable list across searches (Phase 5 report build)
#   Q3 changed-space data       -> flag + one-click manual refresh per space (built; see A10 / flow-6)
#   Q4 ad-hoc placement         -> mixed in with database spaces (built; see A17 / flow-2)

flows:
  - id: flow-1
    title: "Staff adds buildings to a project via search"
    steps:
      - "Staff opens an existing project"
      - "Clicks \"Add a search\" on the Searches card"
      - "Lands on the staff search builder, scoped to this project"
      - "Enters a location (e.g. \"Soho\") and an optional radius"
      - "Adjusts filters: amenities, providers, desk range"
      - "Sees buildings update in both the list and the map in real time"
      - "Clicks select on a building (in list or on map) — building is added to the project's search"
      - "Continues selecting until satisfied with the shortlist"
      - "On reaching 12 selected buildings, a warning shows and further selection is blocked until one is removed (A16)"
      - "Returns to the project detail page — the selected buildings now appear under the search"
    errors:
      - "No buildings match the filters — the list shows an empty state with a suggestion to widen the search"
      - "Location not recognised — geocoder returns no result, the search defaults to the previous location with a warning"
      - "12-building limit reached — selecting a 13th is blocked with a clear message; staff must remove one first"
    sequence: |
      sequenceDiagram
        Staff->>Project: Opens project detail
        Staff->>SearchBuilder: Clicks "Add a search"
        SearchBuilder-->>Staff: List + map view, scoped to project
        Staff->>SearchBuilder: Enters location + filters
        SearchBuilder->>Database: Query published buildings within radius matching filters
        Database-->>SearchBuilder: Buildings + markers
        Staff->>SearchBuilder: Selects a building
        SearchBuilder->>Database: Create SearchResult linked to search (snapshots building_data)
        SearchBuilder-->>Staff: Building marked selected, count updates
        Staff->>Project: Returns to project — sees attached buildings under the search

  - id: flow-2
    title: "Staff curates spaces on a selected building"
    steps:
      - "On the project detail page, staff clicks into one of the selected buildings"
      - "Sees the list of all currently published spaces in that building (may be empty)"
      - "Ticks the spaces that should appear on the client report"
      - "Optionally also adds ad-hoc spaces on the same building — database picks and ad-hoc entries coexist (A17)"
      - "Each tick snapshots the space onto the project — the original is unchanged"
      - "Returns to the project — selected database spaces and ad-hoc spaces are both visible under the building"
    errors:
      - "Building has no published spaces — staff sees a message explaining this and the option to add an ad-hoc space; the building can still be included"
    sequence: |
      sequenceDiagram
        Staff->>Project: Opens project, clicks into a building
        Project->>Database: Load building's currently published spaces
        Database-->>Staff: Space list with tick boxes
        Staff->>Project: Ticks specific spaces
        Project->>Database: Add space to report (HABTM); snapshot captured
        Project-->>Staff: Selected count updates

  - id: flow-3
    title: "Staff adds an ad-hoc space"
    steps:
      - "On a building's detail within a project, staff clicks \"Add ad-hoc space\""
      - "Fills in a small form: name, type, floor or placement, desk range, monthly cost, availability status"
      - "Saves"
      - "Space appears in the building's selected list with a small \"Manual\" tag to distinguish it from database spaces"
    errors:
      - "Negative price — form error"
      - "Max desks below min desks — form error"
      - "Required field missing — inline error"
    sequence: |
      sequenceDiagram
        Staff->>Project: Clicks "Add ad-hoc space" on a building
        Project-->>Staff: Ad-hoc space form
        Staff->>Project: Fills form, saves
        Project->>Database: Create Space with report_id (ad-hoc)
        Project-->>Staff: Space added with "Manual" tag

  - id: flow-4
    title: "Staff reorders selected buildings within a project"
    steps:
      - "On the project detail page, staff sees the selected buildings list"
      - "Drags a building up or down to reorder"
      - "Order is saved automatically — no separate save button"
      - "The new order is the order the client will see in the report"
    sequence: |
      sequenceDiagram
        Staff->>Project: Drags a building to a new position
        Project->>Database: Update position on each affected SearchResult
        Database-->>Staff: New order persisted, no reload needed

  - id: flow-5
    title: "Staff removes a building from a project"
    steps:
      - "On the project detail page, staff clicks remove on a selected building"
      - "Confirmation prompt: \"Remove this building? Any space picks or ad-hoc entries on this building will also be removed.\""
      - "Staff confirms"
      - "Building is unselected from the project's search; attached spaces and ad-hoc entries are removed"
    sequence: |
      sequenceDiagram
        Staff->>Project: Clicks remove on a building
        Project-->>Staff: Confirmation prompt
        Staff->>Project: Confirms
        Project->>Database: Destroy SearchResult; remove report.spaces for that building; destroy ad-hoc Space records
        Project-->>Staff: Building gone from list

  - id: flow-6
    title: "Staff sees a flag when underlying space data has changed"
    steps:
      - "Staff opens a project where a previously selected space's underlying data has changed (e.g. provider raised the price)"
      - "Sees a small flag on the project detail: \"3 spaces have changed since you added them\""
      - "Clicks the flag to see what changed (price, availability, name)"
      - "Chooses to either refresh the snapshot (pull the latest data) or keep the original snapshot"
    sequence: |
      sequenceDiagram
        Staff->>Project: Opens project
        Project->>Database: Compare snapshots vs current space data
        Database-->>Project: Diff per space
        Project-->>Staff: "3 spaces have changed" flag
        Staff->>Project: Clicks flag, sees diff
        Staff->>Project: Refreshes (or keeps) per space
        Project->>Database: Update snapshot if refreshed

not_in_scope:
  - "Generating or sending PDF reports to clients — Phase 5"
  - "Sending intro leads to provider contacts — Phase 5"
  - "Viewing request forms on the client-facing report (share link) — Phase 5"
  - "Provider unsubscribe flow — Phase 5"
  - "Staff editing the underlying building data — staff are read-only on building information"
  - "Staff publishing or unpublishing buildings or spaces — admin-only"
  - "Custom branding per client or per project — the report uses the existing ADAPT style"
  - "Saved searches that staff can rerun later — out of scope for Phase 4"
  - "Multi-select bulk actions on selected buildings (e.g. \"remove all from London\")"
  - "Comparison view side-by-side between buildings on the project — out of scope"

sign_off_criteria:
  # 4a — Building selection
  - text: "From a project, staff can launch a search builder scoped to that project"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "Open any project, click \"Add a search\". The search builder opens with the project context preserved."

  - text: "Staff search builder shows results in synchronised list and map views"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "Open a project → \"Add a search\" to reach the builder. Confirm the list on the left and map on the right both update when filters change. Selecting a building in one updates the other."

  - text: "Filters work for location/radius, provider, amenities, and desk range"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "In the search builder (project → \"Add a search\"), apply each filter in turn; confirm the building list and the map both update."

  - text: "Search results include all published buildings; unpublished buildings are excluded; buildings with no available spaces are still shown"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "In the search builder, confirm a published building with zero available spaces still appears (staff add ad-hoc spaces to it). Confirm an unpublished building never appears."

  - text: "A report is capped at 12 buildings; reaching the limit shows a warning and blocks further additions"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "Add buildings until you hit 12. The 13th should be blocked with a clear message until you remove one. The cap is per report, not per project."

  - text: "Database spaces and ad-hoc spaces can coexist on the same building"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "On a building with database spaces, tick some AND add an ad-hoc space. Both appear under the building on the project."

  - text: "Building cards show provider logo, name, address, distance, available-space count, and a select toggle"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "Visual confirmation in the search builder (project → \"Add a search\")."

  - text: "Map pins use provider logos where available, with a fallback marker; clicking a pin opens a popup with select/deselect"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "In the search builder, click a few pins to verify the logo pins, fallback marker, and popup behaviour."

  - text: "Staff can select and deselect buildings; the count updates and the project's search is updated immediately"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "In the search builder, toggle a few buildings on/off; return to the project to confirm the selected list matches."

  - text: "Selected buildings can be reordered by drag-and-drop; the order is preserved"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "On the project detail page, drag a building up or down. Refresh the page; the order should persist."

  - text: "Removing a building prompts for confirmation and also removes any space picks or ad-hoc entries on that building"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "Add some space picks to a building, then remove the building. Confirm the spaces are also gone."

  # 4b — Space curation
  - text: "Staff can see all of a building's currently published spaces and tick which ones go on the report"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "From the project, click into a selected building. Spaces appear with tick boxes. Ticks save immediately."

  - text: "Selected database spaces are snapshotted — provider edits afterwards do not alter what's on the report"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "We will demonstrate this during the walkthrough — pick a space, edit it as a provider, return to the report and confirm the original snapshot is intact."

  - text: "Staff can add ad-hoc spaces with a small form (name, type, desks, pricing, availability)"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "On a building within a project, click \"Add ad-hoc space\". Fill in the form and save."

  - text: "Ad-hoc spaces are visually distinguished from database-linked spaces (\"Manual\" tag)"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "On the project detail page, ad-hoc spaces show a small \"Manual\" tag next to the name."

  - text: "Staff can edit any space attached to a report; edits to database-linked snapshots do not affect the original"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "Click into a snapshotted space, change the price, save. Open the original space in the admin or provider area; it should be unchanged."

  - text: "Staff can remove a space from a report; ad-hoc spaces are deleted, snapshotted spaces are simply unselected"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "Remove an ad-hoc space and a snapshotted space. Confirm the ad-hoc one is gone, and the snapshotted one's original record is untouched."

  - text: "Ad-hoc space pricing follows the same rules as Phase 3 (no negatives, max desks ≥ min desks, blank pricing allowed)"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "In the \"Add ad-hoc space\" form, try entering a negative price or a max-below-min desk range; the form should reject with a clear error."

  - text: "Staff are alerted when underlying space data has changed since selection, with a one-click refresh option per space"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "We will demonstrate the change-detection flag during the walkthrough — provider edits a space staff has selected, staff sees a flag, can choose to refresh or keep the snapshot."

  # 4c — Project ↔ search entry
  - text: "Starting a search from a project ties it to that project and client with no separate \"pick a client\" step (project-first default)"
    url: "https://app.adaptworkspace.com/staff/projects"
    note: "Open a project, click \"Add a search\". Confirm the resulting search/report is already attached to that project — no client-selection step."

  - text: "A standalone search can be saved to a project later — create a new project (with client details) or add to an existing one"
    url: "https://app.adaptworkspace.com/staff/searches"
    note: "From a standalone search, use \"Save to a project\". Confirm both options: create-new (entering client details inline) and add-to-existing."

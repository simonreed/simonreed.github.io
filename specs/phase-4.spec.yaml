slug: phase-4
title: "Phase 4 — Building Selection & Availability"
version: "1.0"
date: "14 May 2026"
client: "Liz Cale"
status: awaiting-sign-off

summary: |
  Phase 4 turns proposals from empty client-detail records into the consultant's
  working surface for choosing buildings and curating spaces. It runs across two
  parallel workstreams.

  Phase 3 established that a proposal aggregates one or more searches. Each
  search captures a snapshot of the buildings that matched, and each building
  holds the spaces that were selected. Phase 4 makes that pipeline usable by
  staff — they can run a search inside a proposal context, choose which
  buildings the client should see, and curate the spaces on each building. The
  curated set is what becomes the client report in Phase 5.

  4a. Building selection (list + map) — from a proposal, staff can launch a
  search by location with filters for provider, amenity, and desk range. The
  results render in two synchronised views: a list of buildings with provider
  logos and key facts, and an interactive map with selectable pins. Selecting
  a building attaches it to the proposal's search; deselecting removes it.
  Staff can reorder the selected buildings to control the order they appear
  in the report.

  4b. Space curation per building — for each selected building, staff can
  see all the published spaces the provider currently has and tick the ones
  that should appear on the report. They can also manually add ad-hoc spaces
  for availability the consultant knows about but that isn't in the system
  yet. Both database-linked and ad-hoc spaces are snapshotted to the report
  so later changes by the provider don't alter what was sent to the client.

  This phase does not include sending the report to the client or to providers
  — those flows are Phase 5.

assumptions:
  # 4a — Building selection
  - id: A1
    text: "From the proposal detail page, staff can click \"Add a search\" to open the staff search builder scoped to that proposal. Any buildings or spaces they pick are linked to that proposal via the search."

  - id: A2
    text: "The staff search builder is a single screen with a location search at the top, a list view of matching buildings on the left, and a map view on the right. The two views are synchronised — selecting a building on the map highlights it in the list, and vice versa."

  - id: A3
    text: "The search results show only buildings that are published and have at least one published space. Unpublished buildings and buildings with no available spaces are hidden so staff don't accidentally include them."

  - id: A4
    text: "Filters available on the search builder: location with radius (in miles), provider, amenities (multi-select with AND logic), and desk range (min and max). Filters update both the list and the map in real time."

  - id: A5
    text: "Each building card in the list shows: provider logo, building name, address, distance from the search location, the number of currently available spaces, and a select/deselect toggle."

  - id: A6
    text: "The map uses provider logos as the pin where a logo is available, with a fallback marker style. Clicking a pin opens a small popup with the building name, address, and a select/deselect button."

  - id: A7
    text: "Staff can reorder the selected buildings within a proposal by drag-and-drop. The order stored is the order the buildings will appear in the client report. (See Q1 on default ordering.)"

  - id: A8
    text: "Staff can remove a selected building at any time. Removing a building also removes any space picks and ad-hoc spaces that were attached to it on this proposal — staff are warned before this happens."

  # 4b — Space curation
  - id: A9
    text: "When a building is selected, staff see all of that provider's currently published spaces in that building. Each space row shows: name, type, floor or placement, desk range, monthly cost, and availability status. Staff tick the spaces that should appear on the client report."

  - id: A10
    text: "Selected database spaces are snapshotted onto the proposal at the moment of selection. If the provider later edits or removes the space, the proposal still shows the original details. Staff see a small flag on the proposal if the underlying space has changed since selection."

  - id: A11
    text: "Staff can also add ad-hoc spaces that are not yet in the database — for availability the consultant has heard about directly from a provider but that hasn't been entered yet. An ad-hoc space captures: name, type, floor or placement, desk range, monthly cost, and availability status."

  - id: A12
    text: "Ad-hoc spaces are clearly distinguished from database-linked spaces in the staff UI (a small \"Manual\" tag) so staff always know what they've added themselves vs what came from the provider's data."

  - id: A13
    text: "Staff can edit any space attached to a proposal — both database-linked snapshots and ad-hoc entries. Editing a database-linked space does not affect the original; it only changes what the client sees on this proposal."

  - id: A14
    text: "Staff can remove a space from a proposal at any time. For ad-hoc spaces this deletes the entry. For database-linked snapshots this just unselects them — the original space in the provider's data is untouched."

  - id: A15
    text: "Pricing on ad-hoc spaces follows the same rules as Phase 3 provider pricing: cannot be negative, maximum desks (if set) must be at least the minimum, leaving pricing blank is allowed."

questions:
  - id: Q1
    text: "On selected buildings within a proposal (A7), how should they be ordered by default before staff manually reorders? Our recommendation is by distance from the search location (closest first). Alternatives: alphabetical by building name, or selection order."
    type: choice
    options:
      - "By distance from search location, closest first (our recommendation)"
      - "Alphabetical by building name"
      - "In the order staff selected them"

  - id: Q2
    text: "When a proposal has multiple searches (e.g. one for Soho and one for Aldgate), should the client report combine all selected buildings into one ordered list, or group them by search? Our recommendation is one combined list — clients see a single sequence of options regardless of how staff assembled them."
    type: choice
    options:
      - "One combined list, staff-orderable across all searches (our recommendation)"
      - "Group by search with a heading per search"

  - id: Q3
    text: "When the underlying space data changes after staff has selected it (A10) — e.g. a provider raises the price — how should staff be notified? Our recommendation is a small flag on the staff proposal view (\"3 spaces have changed since you added them\") with a one-click \"refresh snapshots\" action. Liz can decide whether to refresh or keep the originals."
    type: choice
    options:
      - "Flag + manual refresh (our recommendation)"
      - "Auto-refresh: always show the latest provider data"
      - "Never flag: snapshots are frozen forever once selected"

  - id: Q4
    text: "Ad-hoc spaces (A11) — should they appear in the client report mixed with database spaces, or in a separate \"Additional options\" section? Our recommendation is mixed — the client doesn't need to know which came from where, only what's available."
    type: choice
    options:
      - "Mixed in with database spaces (our recommendation)"
      - "Separate \"Additional options\" section"

flows:
  - id: flow-1
    title: "Staff adds buildings to a proposal via search"
    steps:
      - "Staff opens an existing proposal"
      - "Clicks \"Add a search\" on the Searches card"
      - "Lands on the staff search builder, scoped to this proposal"
      - "Enters a location (e.g. \"Soho\") and an optional radius"
      - "Adjusts filters: amenities, providers, desk range"
      - "Sees buildings update in both the list and the map in real time"
      - "Clicks select on a building (in list or on map) — building is added to the proposal's search"
      - "Continues selecting until satisfied with the shortlist"
      - "Returns to the proposal detail page — the selected buildings now appear under the search"
    errors:
      - "No buildings match the filters — the list shows an empty state with a suggestion to widen the search"
      - "Location not recognised — geocoder returns no result, the search defaults to the previous location with a warning"
    sequence: |
      sequenceDiagram
        Staff->>Proposal: Opens proposal detail
        Staff->>SearchBuilder: Clicks "Add a search"
        SearchBuilder-->>Staff: List + map view, scoped to proposal
        Staff->>SearchBuilder: Enters location + filters
        SearchBuilder->>Database: Query published buildings within radius matching filters
        Database-->>SearchBuilder: Buildings + markers
        Staff->>SearchBuilder: Selects a building
        SearchBuilder->>Database: Create SearchResult linked to search (snapshots building_data)
        SearchBuilder-->>Staff: Building marked selected, count updates
        Staff->>Proposal: Returns to proposal — sees attached buildings under the search

  - id: flow-2
    title: "Staff curates spaces on a selected building"
    steps:
      - "On the proposal detail page, staff clicks into one of the selected buildings"
      - "Sees the list of all currently published spaces in that building"
      - "Ticks the spaces that should appear on the client report"
      - "Each tick snapshots the space onto the proposal — the original is unchanged"
      - "Returns to the proposal — selected spaces are visible under the building"
    errors:
      - "Building has no published spaces — staff sees a message explaining this and the option to add an ad-hoc space"
    sequence: |
      sequenceDiagram
        Staff->>Proposal: Opens proposal, clicks into a building
        Proposal->>Database: Load building's currently published spaces
        Database-->>Staff: Space list with tick boxes
        Staff->>Proposal: Ticks specific spaces
        Proposal->>Database: Add space to report (HABTM); snapshot captured
        Proposal-->>Staff: Selected count updates

  - id: flow-3
    title: "Staff adds an ad-hoc space"
    steps:
      - "On a building's detail within a proposal, staff clicks \"Add ad-hoc space\""
      - "Fills in a small form: name, type, floor or placement, desk range, monthly cost, availability status"
      - "Saves"
      - "Space appears in the building's selected list with a small \"Manual\" tag to distinguish it from database spaces"
    errors:
      - "Negative price — form error"
      - "Max desks below min desks — form error"
      - "Required field missing — inline error"
    sequence: |
      sequenceDiagram
        Staff->>Proposal: Clicks "Add ad-hoc space" on a building
        Proposal-->>Staff: Ad-hoc space form
        Staff->>Proposal: Fills form, saves
        Proposal->>Database: Create Space with report_id (ad-hoc)
        Proposal-->>Staff: Space added with "Manual" tag

  - id: flow-4
    title: "Staff reorders selected buildings within a proposal"
    steps:
      - "On the proposal detail page, staff sees the selected buildings list"
      - "Drags a building up or down to reorder"
      - "Order is saved automatically — no separate save button"
      - "The new order is the order the client will see in the report"
    sequence: |
      sequenceDiagram
        Staff->>Proposal: Drags a building to a new position
        Proposal->>Database: Update position on each affected SearchResult
        Database-->>Staff: New order persisted, no reload needed

  - id: flow-5
    title: "Staff removes a building from a proposal"
    steps:
      - "On the proposal detail page, staff clicks remove on a selected building"
      - "Confirmation prompt: \"Remove this building? Any space picks or ad-hoc entries on this building will also be removed.\""
      - "Staff confirms"
      - "Building is unselected from the proposal's search; attached spaces and ad-hoc entries are removed"
    sequence: |
      sequenceDiagram
        Staff->>Proposal: Clicks remove on a building
        Proposal-->>Staff: Confirmation prompt
        Staff->>Proposal: Confirms
        Proposal->>Database: Destroy SearchResult; remove report.spaces for that building; destroy ad-hoc Space records
        Proposal-->>Staff: Building gone from list

  - id: flow-6
    title: "Staff sees a flag when underlying space data has changed"
    steps:
      - "Staff opens a proposal where a previously selected space's underlying data has changed (e.g. provider raised the price)"
      - "Sees a small flag on the proposal detail: \"3 spaces have changed since you added them\""
      - "Clicks the flag to see what changed (price, availability, name)"
      - "Chooses to either refresh the snapshot (pull the latest data) or keep the original snapshot"
    sequence: |
      sequenceDiagram
        Staff->>Proposal: Opens proposal
        Proposal->>Database: Compare snapshots vs current space data
        Database-->>Proposal: Diff per space
        Proposal-->>Staff: "3 spaces have changed" flag
        Staff->>Proposal: Clicks flag, sees diff
        Staff->>Proposal: Refreshes (or keeps) per space
        Proposal->>Database: Update snapshot if refreshed

not_in_scope:
  - "Generating or sending PDF reports to clients — Phase 5"
  - "Sending intro leads to provider contacts — Phase 5"
  - "Viewing request forms on the public proposal page — Phase 5"
  - "Provider unsubscribe flow — Phase 5"
  - "Staff editing the underlying building data — staff are read-only on building information"
  - "Staff publishing or unpublishing buildings or spaces — admin-only"
  - "Custom branding per client or per proposal — the report uses the existing ADAPT style"
  - "Saved searches that staff can rerun later — out of scope for Phase 4"
  - "Multi-select bulk actions on selected buildings (e.g. \"remove all from London\")"
  - "Comparison view side-by-side between buildings on the proposal — out of scope"

sign_off_criteria:
  # 4a — Building selection
  - text: "From a proposal, staff can launch a search builder scoped to that proposal"
    url: "https://app.adaptworkspace.com/staff/proposals"
    note: "Open any proposal, click \"Add a search\". The search builder opens with the proposal context preserved."

  - text: "Staff search builder shows results in synchronised list and map views"
    note: "On the search builder, confirm the list on the left and map on the right both update when filters change. Selecting a building in one updates the other."

  - text: "Filters work for location/radius, provider, amenities, and desk range"
    note: "Apply each filter in turn; confirm the building list and the map both update."

  - text: "Search results include only published buildings with at least one published space"
    note: "We will demonstrate the underlying scope during the walkthrough — buildings that are draft or have no available spaces are excluded."

  - text: "Building cards show provider logo, name, address, distance, available-space count, and a select toggle"
    note: "Visual confirmation on the search builder."

  - text: "Map pins use provider logos where available, with a fallback marker; clicking a pin opens a popup with select/deselect"
    note: "Visual confirmation on the search builder. Click a few pins to verify the popup behaviour."

  - text: "Staff can select and deselect buildings; the count updates and the proposal's search is updated immediately"
    note: "Toggle a few buildings on/off; return to the proposal to confirm the selected list matches."

  - text: "Selected buildings can be reordered by drag-and-drop; the order is preserved"
    url: "https://app.adaptworkspace.com/staff/proposals"
    note: "On the proposal detail page, drag a building up or down. Refresh the page; the order should persist."

  - text: "Removing a building prompts for confirmation and also removes any space picks or ad-hoc entries on that building"
    url: "https://app.adaptworkspace.com/staff/proposals"
    note: "Add some space picks to a building, then remove the building. Confirm the spaces are also gone."

  # 4b — Space curation
  - text: "Staff can see all of a building's currently published spaces and tick which ones go on the report"
    url: "https://app.adaptworkspace.com/staff/proposals"
    note: "From the proposal, click into a selected building. Spaces appear with tick boxes. Ticks save immediately."

  - text: "Selected database spaces are snapshotted — provider edits afterwards do not alter what's on the proposal"
    note: "We will demonstrate this during the walkthrough — pick a space, edit it as a provider, return to the proposal and confirm the original snapshot is intact."

  - text: "Staff can add ad-hoc spaces with a small form (name, type, desks, pricing, availability)"
    url: "https://app.adaptworkspace.com/staff/proposals"
    note: "On a building within a proposal, click \"Add ad-hoc space\". Fill in the form and save."

  - text: "Ad-hoc spaces are visually distinguished from database-linked spaces (\"Manual\" tag)"
    url: "https://app.adaptworkspace.com/staff/proposals"
    note: "On the proposal detail page, ad-hoc spaces show a small \"Manual\" tag next to the name."

  - text: "Staff can edit any space attached to a proposal; edits to database-linked snapshots do not affect the original"
    url: "https://app.adaptworkspace.com/staff/proposals"
    note: "Click into a snapshotted space, change the price, save. Open the original space in the admin or provider area; it should be unchanged."

  - text: "Staff can remove a space from a proposal; ad-hoc spaces are deleted, snapshotted spaces are simply unselected"
    url: "https://app.adaptworkspace.com/staff/proposals"
    note: "Remove an ad-hoc space and a snapshotted space. Confirm the ad-hoc one is gone, and the snapshotted one's original record is untouched."

  - text: "Ad-hoc space pricing follows the same rules as Phase 3 (no negatives, max desks ≥ min desks, blank pricing allowed)"
    note: "Try entering a negative price or a max-below-min desk range; the form should reject with a clear error."

  - text: "Staff are alerted when underlying space data has changed since selection, with a one-click refresh option per space"
    url: "https://app.adaptworkspace.com/staff/proposals"
    note: "We will demonstrate the change-detection flag during the walkthrough — provider edits a space staff has selected, staff sees a flag, can choose to refresh or keep the snapshot."
